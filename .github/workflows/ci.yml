name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo_sqlite, sqlite3, tokenizer, xml

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel app
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test
